<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emergent Ontology Wiki</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- NAV -->
  <nav id="topnav">
    <div class="nav-left">
      <span class="logo">∿ EO</span>
      <span class="logo-text">Emergent Ontology</span>
    </div>
    <div class="nav-right">
      <button id="theme-btn" onclick="toggleTheme()" title="Toggle theme">◐</button>
      <button id="search-btn" onclick="openSearch()" title="Search (⌘K)">⌕</button>
    </div>
  </nav>

  <!-- SEARCH OVERLAY -->
  <div id="search-overlay" class="overlay hidden" onclick="if(event.target===this)closeSearch()">
    <div class="search-modal">
      <input id="search-input" type="text" placeholder="Search articles..." oninput="renderList()">
      <div id="search-results"></div>
    </div>
  </div>

  <!-- MAIN -->
  <main id="app">

    <!-- LIST VIEW -->
    <section id="list-view">
      <header class="page-header">
        <h1>Wiki</h1>
        <p class="subtitle">A living map of Emergent Ontology</p>
      </header>

      <div class="controls">
        <div class="filter-row">
          <input id="filter-input" type="text" placeholder="Filter articles..." oninput="renderList()">
        </div>
        <div class="filter-row">
          <div id="level-filters" class="pill-group"></div>
          <div id="cluster-filters" class="pill-group"></div>
        </div>
        <div class="view-toggle">
          <button class="vt active" data-view="grouped" onclick="setView('grouped')">Grouped</button>
          <button class="vt" data-view="level" onclick="setView('level')">By Level</button>
          <button class="vt" data-view="all" onclick="setView('all')">All</button>
        </div>
      </div>

      <div id="article-grid"></div>
    </section>

    <!-- ARTICLE VIEW -->
    <section id="article-view" class="hidden">
      <button class="back-btn" onclick="goBack()">← Back</button>
      <article id="article-content"></article>
      <aside id="related-articles"></aside>
    </section>

    <!-- EDITOR -->
    <section id="editor-view" class="hidden">
      <button class="back-btn" onclick="goBack()">← Back</button>
      <h2 id="editor-title">New Article</h2>
      <form id="editor-form" onsubmit="return saveArticle(event)">
        <label>Title<input id="ed-title" required></label>
        <label>Slug<input id="ed-slug" placeholder="auto-generated"></label>
        <label>Level
          <select id="ed-level">
            <option value="101">101</option>
            <option value="201">201</option>
            <option value="301">301</option>
            <option value="401">401</option>
          </select>
        </label>
        <label>Tags <small>(comma-separated)</small><input id="ed-tags"></label>
        <label>Keywords <small>(comma-separated)</small><input id="ed-keywords"></label>
        <label>Body <small>(Markdown supported)</small>
          <textarea id="ed-body" rows="20"></textarea>
        </label>
        <div class="editor-actions">
          <button type="submit" class="btn primary">Save</button>
          <button type="button" class="btn" onclick="goBack()">Cancel</button>
        </div>
      </form>
    </section>
  </main>

  <!-- FAB: New Article -->
  <button id="fab" onclick="openEditor()" title="New Article">+</button>

  <script src="app.js"></script>
</body>
</html>
